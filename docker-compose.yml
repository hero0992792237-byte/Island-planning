# 迹划 - Docker Compose 部署
# 使用方式:
# 1. docker-compose up -d
# 2. docker-compose down

version: '3.8'

services:
  island-planner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: island-planner
    restart: unless-stopped
    ports:
      - "3000:3000"    # 前端
      - "3001:3001"    # 后端
    environment:
      - NODE_ENV=production
      - VITE_LLM_KEY=${VITE_LLM_KEY}
      - VITE_LLM_BASE_URL=${VITE_LLM_BASE_URL}
      - VITE_LLM_MODEL=${VITE_LLM_MODEL}
      - VITE_AMAP_KEY=${VITE_AMAP_KEY}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - MEITUAN_TRAVEL_TOKEN=${MEITUAN_TRAVEL_TOKEN}
      - MEITUAN_VENUE_CLIENT_ID=${MEITUAN_VENUE_CLIENT_ID}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理（可选，如果需要 HTTPS）
  nginx:
    image: nginx:alpine
    container_name: island-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - island-planner
    profiles:
      - "with-nginx"  # 使用: docker-compose --profile with-nginx up -d